<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1 id="page-title">Dashboard</h1>
        </header>

        <main id="view-container">
            <!-- DASHBOARD -->
            <section id="view-dashboard" class="view active">
                <div class="balance-card">
                    <p>Total Balance</p>
                    <h2 id="total-balance">0</h2>
                </div>
                <div class="mini-cards">
                    <div class="mini-card">
                        <p>This Month Income</p>
                        <h3 id="month-income">0</h3>
                    </div>
                    <div class="mini-card">
                        <p>This Month Expense</p>
                        <h3 id="month-expense">0</h3>
                    </div>
                </div>
                <div class="chart-box">
                    <h3>Expense by Category</h3>
                    <canvas id="pie-chart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Income vs Expense (6 Months)</h3>
                    <canvas id="trend-chart"></canvas>
                </div>
                <div class="recent-box">
                    <div class="recent-head">
                        <h3>Recent Transactions</h3>
                        <a href="#" id="view-all-link">View All</a>
                    </div>
                    <ul id="recent-list" class="txn-list"></ul>
                </div>
            </section>

            <!-- TRANSACTIONS -->
            <section id="view-transactions" class="view">
                <div class="toolbar">
                    <input type="search" id="search-input" placeholder="Search...">
                    <select id="filter-type">
                        <option value="all">All</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <select id="filter-category"><option value="all">Category</option></select>
                    <input type="date" id="filter-from">
                    <input type="date" id="filter-to">
                </div>
                <div id="txn-groups"></div>
            </section>

            <!-- BUDGET -->
            <section id="view-budget" class="view">
                <div id="budget-warning" class="warning-banner hidden">Budget exceeded!</div>
                <div id="budget-list"></div>
                <button id="add-budget-btn" class="secondary-btn">Set / Edit Budgets</button>
            </section>

            <!-- SETTINGS -->
            <section id="view-settings" class="view">
                <div class="settings-group">
                    <label>Theme</label>
                    <button id="theme-toggle" class="secondary-btn">Toggle Dark/Light</button>
                </div>
                <div class="settings-group">
                    <label>Currency</label>
                    <select id="currency-select">
                        <option value="₹">₹ INR</option>
                        <option value="$">$ USD</option>
                        <option value="€">€ EUR</option>
                        <option value="£">£ GBP</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label>Categories</label>
                    <div id="category-list"></div>
                    <button id="add-category-btn" class="secondary-btn">Add Category</button>
                </div>
                <div class="settings-group">
                    <label>Data</label>
                    <button id="export-btn" class="secondary-btn">Export JSON</button>
                    <button id="import-btn" class="secondary-btn">Import JSON</button>
                    <input type="file" id="import-file" accept="application/json" class="hidden">
                    <button id="clear-btn" class="danger-btn">Clear All Data</button>
                </div>
            </section>
        </main>

        <nav class="bottom-tabs">
            <button class="tab active" data-view="dashboard">Dashboard</button>
            <button class="tab" data-view="transactions">Transactions</button>
            <button id="fab" class="fab">+</button>
            <button class="tab" data-view="budget">Budget</button>
            <button class="tab" data-view="settings">Settings</button>
        </nav>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span id="modal-close" class="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
