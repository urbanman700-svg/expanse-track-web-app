name: Cordova Android Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.1.1-all.zip
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android Build Tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" || sdkmanager "build-tools;33.0.2"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1
      - name: Install Cordova CLI
        run: npm install -g cordova
      - name: Install Dependencies
        run: npm install
      - name: Add Android Platform & Prepare
        run: cordova platform add android --nosave || true
      - name: Build Android Artifact
        env:
          BUILD_FORMAT: "apk"
          IS_RELEASE: "true"
        run: |
          if [ "$IS_RELEASE" = "true" ]; then
            if [ "$BUILD_FORMAT" = "aab" ]; then
              CORDOVA_CMD="cordova build android --release -- --packageType=bundle --stacktrace --info"
            else
              CORDOVA_CMD="cordova build android --release -- --packageType=apk --stacktrace --info"
            fi
          else
            CORDOVA_CMD="cordova build android --debug -- --stacktrace --info"
          fi
          eval "$CORDOVA_CMD"
      - name: Sign Release Artifact
        env:
          KEYSTORE_B64: ""
          KEYSTORE_PWD: "123456"
          ALIAS: "Web-app"
          KEY_PWD: "123456"
          BUILD_FORMAT: "apk"
        run: |
          echo "::add-mask::$KEYSTORE_B64"
          echo "::add-mask::$KEYSTORE_PWD"
          echo "::add-mask::$KEY_PWD"
          
          # 1. Decode keystore file
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          
          # 2. Create output directory
          mkdir -p dist-out
          
          # 3. Perform signing
          if [ "$BUILD_FORMAT" = "aab" ]; then
            TARGET_AAB=$(find . -name "*.aab" | grep -v "node_modules" | head -n 1)
            if [ -n "$TARGET_AAB" ]; then
              echo "Signing AAB: $TARGET_AAB"
              jarsigner -keystore release.keystore -storepass "$KEYSTORE_PWD" -keypass "$KEY_PWD" "$TARGET_AAB" "$ALIAS"
              cp "$TARGET_AAB" dist-out/app-release.aab
              echo "AAB signed successfully"
            else
              echo "Error: Could not find any AAB files to sign"
              exit 1
            fi
          else
            TARGET_APK=$(find . -name "*unsigned.apk" -o -name "*release.apk" | grep -v "node_modules" | head -n 1)
            if [ -n "$TARGET_APK" ]; then
              echo "Signing APK: $TARGET_APK"
              APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1)
              $APKSIGNER sign --ks release.keystore --ks-key-alias "$ALIAS" --ks-pass pass:"$KEYSTORE_PWD" --key-pass pass:"$KEY_PWD" --out dist-out/app-release.apk "$TARGET_APK"
              echo "APK signed successfully"
            else
              echo "Error: Could not find any APK files to sign"
              exit 1
            fi
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: |
            dist-out/app-release.apk
      