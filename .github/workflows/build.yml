name: Cordova Android Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.1.1-all.zip
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android Build Tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" || sdkmanager "build-tools;33.0.2"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1
      - name: Install Cordova CLI
        run: npm install -g cordova
      - name: Install Dependencies
        run: npm install
      - name: Add Android Platform & Prepare
        run: cordova platform add android --nosave || true
      - name: Build Android APK
        env:
          CORDOVA_CMD: "cordova build android --release -- --stacktrace --info"
        run: eval "$CORDOVA_CMD"
      - name: Sign Release Artifact (Debug Keystore)
        env:
          BUILD_FORMAT: "apk"
        run: |
          # 1. Generate debug keystore
          keytool -genkey -v -keystore release.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 2. Create output directory
          mkdir -p dist-out
          
          # 3. Perform signing
          if [ "$BUILD_FORMAT" = "aab" ]; then
            TARGET_AAB=$(find . -name "*.aab" | grep -v "node_modules" | head -n 1)
            if [ -n "$TARGET_AAB" ]; then
              echo "Signing AAB: $TARGET_AAB"
              jarsigner -keystore release.keystore -storepass android -keypass android "$TARGET_AAB" androiddebugkey
              cp "$TARGET_AAB" dist-out/app-release.aab
              echo "AAB signed successfully"
            else
              echo "Error: Could not find any AAB files to sign"
              exit 1
            fi
          else
            TARGET_APK=$(find . -name "*unsigned.apk" -o -name "*release.apk" | grep -v "node_modules" | head -n 1)
            if [ -n "$TARGET_APK" ]; then
              echo "Signing APK: $TARGET_APK"
              APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1)
              $APKSIGNER sign --ks release.keystore --ks-key-alias androiddebugkey --ks-pass pass:android --key-pass pass:android --out dist-out/app-release.apk "$TARGET_APK"
              echo "APK signed successfully"
            else
              echo "Error: Could not find any APK files to sign"
              exit 1
            fi
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: |
            dist-out/app-release.apk
      